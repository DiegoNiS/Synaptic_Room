services:
  client:
    build:
      context: ./client
    ports:
      - "5174:80"
    environment:
      - VITE_SERVER_URL=http://localhost:3001
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  server:
    build:
      context: ./server
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=development
      - AI_AGENT_BASE_URL=http://agents:8000
      - CORS_ORIGIN=http://localhost:5174
      - SUPABASE_URL=${SUPABASE_URL:-https://mock.supabase.co}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-mock_key}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-mock_service_key}
      - AI_AGENT_TIMEOUT_MS=15000
    depends_on:
      agents:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  agents:
    build:
      context: ./agents
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 15s
